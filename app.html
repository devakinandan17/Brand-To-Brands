<!DOCTYPE html>
<html>
<head>
    <title>OTP Input</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #e8b8b8;
        }

        .otp-container {
            display: flex;
            gap: 10px;
        }

        .otp-box {
            width: 40px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: 2px solid #eadfdf;
            border-radius: 5px;
        }

        .otp-box:focus {
            border-color: green;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background:green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div>
    <h3>Enter OTP</h3>

    <div class="otp-container">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
        <input type="text" maxlength="1" class="otp-box">
    </div>

    <button onclick="getOTP()">Verify OTP</button>
</div>

<script>
    const inputs = document.querySelectorAll(".otp-box");

    inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && index > 0 && input.value === "") {
                inputs[index - 1].focus();
            }
        });
    });

    function getOTP() {
        let otp = "";
        inputs.forEach(input => otp += input.value);

        alert("Entered OTP: " + otp);

        // Example verification
        if (otp === "123456") {
            alert("✅ OTP Verified!");
        } else {
            alert("❌ Invalid OTP");
        }
    }
</script>

</body>
</html>
