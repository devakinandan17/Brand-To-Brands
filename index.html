<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="user" placeholder="Enter Email or Phone">
    <input type="password" id="pass" placeholder="Enter Password">

    <div class="error" id="error"></div>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;
    let error = document.getElementById("error");

    // Simple validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    let phonePattern = /^[0-9]{10}$/;

    if (!user || !pass) {
        error.innerText = "All fields are required!";
        return;
    }

    if (!(emailPattern.test(user) || phonePattern.test(user))) {
        error.innerText = "Enter valid Email or 10-digit Phone Number!";
        return;
    }

    // Dummy login check
    if ((user === "test@gmail.com" || user === "9876543210") && pass === "1234") {
        alert("Login Successful!");
    } else {
        error.innerText = "Invalid credentials!";
    }
}
</script>

</body>
</html>
